<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief - แพลตฟอร์มช่วยเหลือผู้ประสบภัยน้ำท่วม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 0; background-color: #f4f7f6; display: flex; height: 100vh; flex-direction: column; }
        .navbar { background: #1a365d; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* ส่วนแผนที่ */
        .map-section { flex: 2; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }

        /* ส่วนรายงานและขอความช่วยเหลือ */
        .report-section { flex: 1; background: white; padding: 20px; overflow-y: auto; box-shadow: -4px 0 15px rgba(0,0,0,0.05); z-index: 1000; min-width: 350px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn-sos { background: #e53e3e; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;}
        .btn-sos:hover { background: #c53030; }
        .btn-report { background: #3182ce; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        input[type="text"], select { width: 100%; padding: 10px; margin: 8px 0 15px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        .file-drop { border: 2px dashed #a0aec0; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; background: white; }
        .submit-status { display: none; margin-top: 15px; border-radius: 10px; padding: 14px; border: 1px solid transparent; align-items: flex-start; gap: 12px; }
        .submit-status.show { display: flex; }
        .submit-status.loading { background: #ebf8ff; border-color: #bee3f8; color: #2b6cb0; }
        .submit-status.success { background: #f0fff4; border-color: #9ae6b4; color: #276749; }
        .status-title { font-weight: 700; margin-bottom: 4px; }
        .status-message { font-size: 14px; line-height: 1.5; }
        .status-spinner { width: 20px; height: 20px; border: 3px solid #bee3f8; border-top-color: #3182ce; border-radius: 999px; animation: spin 0.8s linear infinite; flex: 0 0 auto; margin-top: 2px; }
        .status-check { width: 22px; height: 22px; border-radius: 999px; background: #38a169; color: white; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; margin-top: 1px; font-size: 13px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="navbar">
        <h2><i class="fa-solid fa-life-ring"></i> Thai Flood Relief</h2>
        <div>ผู้ใช้งานออนไลน์: 124 คน</div>
    </div>

    <div class="main-container">
        <div class="map-section">
            <div id="map"></div>
        </div>

        <div class="report-section">
            <button class="btn-sos"><i class="fa-solid fa-truck-medical"></i> ขอความช่วยเหลือฉุกเฉิน</button>

            <div class="card">
                <h3>รายงานระดับน้ำด้วย AI</h3>
                <label>พิกัดของคุณ (GPS):</label>
                <input type="text" id="locationInput" placeholder="กำลังดึงตำแหน่งพิกัด..." readonly>
                
                <div class="file-drop" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-camera fa-2x" style="color:#718096; margin-bottom:10px;"></i>
                    <p id="fileName">คลิกเพื่ออัปโหลดรูปภาพน้ำท่วม</p>
                    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="document.getElementById('fileName').innerText = this.files[0].name;">
                </div>

                <label style="display:block; margin-top:15px;">รายละเอียดเพิ่มเติม:</label>
                <input type="text" id="detailsInput" placeholder="เช่น ถนนตัดขาด, มีคนติดอยู่ในบ้าน...">

                <button class="btn-report" style="margin-top: 15px;" onclick="submitReport()">ส่งรายงาน & ประเมิน AI</button>
                <div id="submitStatus" class="submit-status" role="status" aria-live="polite">
                    <div id="statusIcon" class="status-spinner"></div>
                    <div>
                        <div id="statusTitle" class="status-title">กำลังส่งรายงาน</div>
                        <div id="statusMessage" class="status-message">กำลังส่งภาพไปให้ AI วิเคราะห์ และปักหมุดลงบนแผนที่รวม...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. สร้างแผนที่และตั้งค่าเริ่มต้น
        const map = L.map('map').setView([13.7563, 100.5018], 10); // ซูมที่กรุงเทพ/ประเทศไทย
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. ขอสิทธิ์เข้าถึง GPS ของผู้ใช้เพื่อกรอกพิกัดอัตโนมัติ
        let userLat, userLng;
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                userLat = position.coords.latitude;
                userLng = position.coords.longitude;
                document.getElementById('locationInput').value = `${userLat.toFixed(5)}, ${userLng.toFixed(5)}`;
                
                // เลื่อนแผนที่ไปหาผู้ใช้และปักหมุดตำแหน่งปัจจุบัน
                map.setView([userLat, userLng], 14);
                L.marker([userLat, userLng]).addTo(map).bindPopup("ตำแหน่งของคุณ").openPopup();
            });
        }

        // 3. จำลองการส่งข้อมูล
        function showSubmitStatus(type, title, message) {
            const status = document.getElementById('submitStatus');
            const icon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');

            status.className = `submit-status show ${type}`;
            icon.className = type === 'success' ? 'status-check' : 'status-spinner';
            icon.innerHTML = type === 'success' ? '<i class="fa-solid fa-check"></i>' : '';
            statusTitle.innerText = title;
            statusMessage.innerText = message;
        }

        async function submitReport() {
            const fileInput = document.getElementById('fileInput');
            const detailsInput = document.getElementById('detailsInput');
            const locationInput = document.getElementById('locationInput');
            const image = fileInput.files && fileInput.files[0];

            if (!image) {
                showSubmitStatus('loading', 'ยังไม่ได้เลือกรูปภาพ', 'กรุณาเลือกรูปน้ำท่วมก่อนส่งรายงาน');
                return;
            }

            const lat = userLat || 13.7563;
            const lng = userLng || 100.5018;
            locationInput.value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

            const formData = new FormData();
            formData.append('image', image);
            formData.append('lat', String(lat));
            formData.append('lng', String(lng));
            formData.append('details', detailsInput ? detailsInput.value : '');
            formData.append('reporterName', 'ผู้ใช้หน้า User');

            showSubmitStatus('loading', 'กำลังส่งรายงาน', 'กำลังส่งภาพไปให้ YOLO วิเคราะห์ระดับน้ำ และบันทึกลงฐานข้อมูล...');

            try {
                const response = await fetch('http://127.0.0.1:3000/api/reports', {
                    method: 'POST',
                    body: formData,
                });
                const payload = await response.json();

                if (!response.ok || !payload.ok) {
                    throw new Error(payload.message || 'ส่งรายงานไม่สำเร็จ');
                }

                L.circle([lat + 0.001, lng + 0.001], {
                    color: 'red', fillColor: '#f03', fillOpacity: 0.5, radius: 100
                }).addTo(map).bindPopup(`<b>ระดับน้ำ ${payload.yolo?.depthCm ?? '-'} ซม.</b><br>ประเมินโดย YOLO<br>สถานะ: ${payload.yolo?.risk ?? 'pending'}`).openPopup();

                showSubmitStatus('success', 'ส่งรายงานสำเร็จ', 'บันทึกรูปภาพ พิกัด ผู้ใช้ และผล YOLO ลงฐานข้อมูลเรียบร้อย');
            } catch (error) {
                showSubmitStatus('loading', 'ส่งรายงานไม่สำเร็จ', error.message || 'ตรวจสอบการเชื่อมต่อ database และ YOLO API');
            }
        }
    </script>
</body>
</html>
