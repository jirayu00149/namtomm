services:
  yolo-water-service:
    build:
      context: .
      dockerfile: tools/yolo-water-service/Dockerfile
    image: rodnam-yolo-water-service:latest
    container_name: rodnam-yolo-water-service
    restart: unless-stopped
    ports:
      - "${YOLO_PUBLIC_PORT:-8010}:8010"
    environment:
      YOLO_API_KEY: "${YOLO_API_KEY:-}"
      YOLO_CONF: "${YOLO_CONF:-0.25}"
      YOLO_IMGSZ: "${YOLO_IMGSZ:-640}"
      YOLO_WATER_LABELS: "${YOLO_WATER_LABELS:-water,flood,flooding,flood-water,flood_water,waterline,water_line,level-}"
      YOLO_REFERENCE_LABELS: "${YOLO_REFERENCE_LABELS:-utility_pole,electric_pole,power_pole,pole,water_level_gauge,water_gauge,staff_gauge,gauge_board,level_staff,water_staff,flood_gauge,ruler,staff,gauge,reference_marker,marker}"
      WATER_REFERENCE_HEIGHT_CM: "${WATER_REFERENCE_HEIGHT_CM:-900}"
      WATER_GAUGE_REFERENCE_HEIGHT_CM: "${WATER_GAUGE_REFERENCE_HEIGHT_CM:-200}"
      WATER_LEVEL_CLASS_STEP_CM: "${WATER_LEVEL_CLASS_STEP_CM:-10}"
      WATER_LEVEL_CLASS_BASE_CM: "${WATER_LEVEL_CLASS_BASE_CM:-0}"
      WATER_ALERT_CM: "${WATER_ALERT_CM:-80}"
      WATER_CRITICAL_CM: "${WATER_CRITICAL_CM:-120}"
